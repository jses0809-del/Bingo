<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Pro Bingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border: 2px solid #e2e8f0; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: all 0.2s; }
        .cell:hover { background-color: #f1f5f9; }
        .cell.called { background-color: #fee2e2; border-color: #ef4444; color: #b91c1c; }
        .cell.marked { background-color: #ef4444; color: white; border-color: #b91c1c; position: relative; }
        .cell.marked::after { content: '❌'; position: absolute; font-size: 0.8rem; top: 2px; right: 2px; }
        .active-player { border-left: 4px solid #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-slate-50 p-4">

    <div id="app" class="max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow-xl">
        <header class="text-center mb-6 border-b pb-4">
            <h1 class="text-3xl font-black text-slate-800">BINGO ONLINE</h1>
            <p class="text-slate-500 text-sm">Firebase Realtime 版</p>
        </header>
        
        <div id="login-section" class="text-center py-10">
            <button id="btn-login" class="bg-white border-2 border-slate-200 hover:border-slate-300 px-8 py-3 rounded-full font-bold flex items-center justify-center mx-auto transition-all shadow-sm">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5 mr-2"> 使用 Google 帳號登入
            </button>
        </div>

        <div id="lobby-section" class="hidden">
            <div class="bg-blue-50 p-4 rounded-xl mb-6 flex items-center justify-between">
                <div id="user-info" class="font-medium text-blue-800"></div>
                <button id="btn-logout" class="text-xs text-slate-400 underline">登出</button>
            </div>
            
            <div class="space-y-4">
                <button id="btn-create" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95">
                    ＋ 創建新房間
                </button>
                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
                    <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-slate-400">或加入現有房間</span></div>
                </div>
                <div class="flex gap-2">
                    <input id="input-room-id" type="text" maxlength="8" placeholder="輸入 8 位房間代碼" class="flex-grow border-2 border-slate-200 p-4 rounded-xl focus:border-blue-500 outline-none text-center tracking-widest font-mono">
                    <button id="btn-join" class="bg-slate-800 hover:bg-black text-white px-8 rounded-xl font-bold">加入</button>
                </div>
            </div>
        </div>

        <div id="room-section" class="hidden">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 class="text-sm text-slate-400 uppercase font-bold tracking-widest">房間代碼</h2>
                    <p class="text-2xl font-mono font-black text-blue-600" id="display-room-id"></p>
                </div>
                <button id="btn-leave" class="bg-slate-100 text-slate-500 px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-50 hover:text-red-500 transition-colors">離開</button>
            </div>

            <div id="host-controls" class="hidden bg-orange-50 border-2 border-orange-100 p-4 rounded-xl mb-6">
                <div class="flex items-center justify-between mb-4">
                    <span class="font-bold text-orange-800">⚙️ 房主設定</span>
                    <div class="flex items-center gap-2">
                        <label class="text-sm">連線目標：</label>
                        <select id="select-goal" class="border rounded px-2 py-1">
                            <option value="1">1 條線</option>
                            <option value="3" selected>3 條線</option>
                            <option value="5">5 條線 (全滿)</option>
                        </select>
                    </div>
                </div>
                <button id="btn-start" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 rounded-lg shadow-md">開始遊戲</button>
            </div>

            <div id="turn-indicator" class="text-center py-2 px-4 rounded-full mb-4 font-bold transition-all">
                等待遊戲開始...
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-1">
                    <h3 class="text-xs font-bold text-slate-400 mb-2">玩家列表 (最多 10 人)</h3>
                    <div id="player-list" class="space-y-2 text-sm"></div>
                </div>

                <div class="md:col-span-2">
                    <div id="game-board" class="bingo-grid pointer-events-none opacity-50">
                        </div>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 這裡請替換成你的 Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBdt75NPrgmYs0rw1KQv_sRfYdFwQimo1c",
        authDomain: "bingo-f3e9d.firebaseapp.com",
        projectId: "bingo-f3e9d",
        storageBucket: "bingo-f3e9d.firebasestorage.app",
        messagingSenderId: "952702149326",
        appId: "1:952702149326:web:883681422e33337b26669f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let currentRoomId = null;
    let myBoard = [];
    let isGameOver = false;

    // --- 初始化 ---
    onAuthStateChanged(auth, user => {
        if (user) {
            currentUser = user;
            document.getElementById('user-info').innerText = `👋 您好, ${user.displayName}`;
            showSection('lobby-section');
        } else {
            showSection('login-section');
        }
    });

    document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    // --- 房間管理 ---
    async function createRoom() {
        const roomId = Math.random().toString().slice(2, 10);
        const roomRef = ref(db, `rooms/${roomId}`);
        await set(roomRef, {
            host: currentUser.uid,
            status: 'waiting',
            settings: { goal: 3 },
            calledNumbers: [0],
            turnIndex: 0,
            playerOrder: [currentUser.uid],
            players: {
                [currentUser.uid]: { name: currentUser.displayName, ready: true }
            }
        });
        joinRoom(roomId);
    }

    async function joinRoom(roomId) {
        const roomRef = ref(db, `rooms/${roomId}`);
        const snap = await get(roomRef);
        if (!snap.exists()) return alert("找不到此房間！");
        if (Object.keys(snap.val().players || {}).length >= 10) return alert("房間已滿！");

        await update(ref(db, `rooms/${roomId}/players/${currentUser.uid}`), {
            name: currentUser.displayName
        });

        // 更新出牌順序清單 (若不在清單中則加入)
        const order = snap.val().playerOrder || [];
        if (!order.includes(currentUser.uid)) {
            order.push(currentUser.uid);
            await update(roomRef, { playerOrder: order });
        }

        currentRoomId = roomId;
        myBoard = []; // 清空舊盤面
        isGameOver = false;
        showSection('room-section');
        document.getElementById('display-room-id').innerText = roomId;
        listenToRoom(roomId);
    }

    function listenToRoom(roomId) {
        onValue(ref(db, `rooms/${roomId}`), snap => {
            const data = snap.val();
            if (!data) return (location.reload());

            // 1. 踢人檢查
            if (!data.players[currentUser.uid]) {
                alert("你已被踢出房間");
                location.reload();
                return;
            }

            // 2. 介面更新
            const isHost = data.host === currentUser.uid;
            document.getElementById('host-controls').classList.toggle('hidden', !isHost || data.status !== 'waiting');
            
            // 3. 玩家列表與輪流顯示
            const activeUid = data.playerOrder[data.turnIndex];
            const pList = document.getElementById('player-list');
            pList.innerHTML = data.playerOrder.map(uid => {
                const p = data.players[uid];
                if (!p) return '';
                const isActive = uid === activeUid && data.status === 'playing';
                return `
                    <div class="flex items-center justify-between p-2 rounded-lg ${isActive ? 'active-player shadow-sm' : ''}">
                        <span class="${isActive ? 'font-bold text-blue-600' : ''}">${p.name} ${uid === data.host ? '👑' : ''}</span>
                        ${isHost && uid !== currentUser.uid ? `<button onclick="kick('${uid}')" class="text-xs text-red-300">踢除</button>` : ''}
                    </div>
                `;
            }).join('');

            // 4. 遊戲狀態邏輯
            const indicator = document.getElementById('turn-indicator');
            if (data.status === 'playing') {
                document.getElementById('game-board').classList.remove('pointer-events-none', 'opacity-50');
                if (myBoard.length === 0) generateBoard();
                
                if (currentUser.uid === activeUid) {
                    indicator.innerText = "⭐ 現在輪到你出牌！";
                    indicator.className = "text-center py-2 bg-blue-500 text-white rounded-full mb-4 animate-pulse";
                } else {
                    indicator.innerText = `等待 ${data.players[activeUid]?.name || '對方'} 出牌...`;
                    indicator.className = "text-center py-2 bg-slate-100 text-slate-500 rounded-full mb-4";
                }
                renderBoard(data.calledNumbers);
                checkWin(data.calledNumbers, data.settings.goal, data.players);
            } else if (data.status === 'ended') {
                indicator.innerText = `🎉 遊戲結束！贏家：${data.winnerName}`;
                indicator.className = "text-center py-2 bg-green-500 text-white rounded-full mb-4";
                document.getElementById('game-board').classList.add('pointer-events-none');
            }
        });
    }

    // --- 賓果核心邏輯 ---
    function generateBoard() {
        myBoard = Array.from({length: 25}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
    }

    function renderBoard(calledNumbers) {
        const container = document.getElementById('game-board');
        container.innerHTML = '';
        myBoard.forEach(num => {
            const isCalled = calledNumbers.includes(num);
            const div = document.createElement('div');
            div.className = `cell ${isCalled ? 'marked' : ''}`;
            div.innerText = num;
            div.onclick = () => handleCellClick(num, calledNumbers);
            container.appendChild(div);
        });
    }

    async function handleCellClick(num, calledNumbers) {
        if (isGameOver) return;
        const roomSnap = await get(ref(db, `rooms/${currentRoomId}`));
        const data = roomSnap.val();
        
        // 檢查是否輪到我
        if (data.playerOrder[data.turnIndex] !== currentUser.uid) return alert("還沒輪到你！");
        if (calledNumbers.includes(num)) return;

        const nextIndex = (data.turnIndex + 1) % data.playerOrder.length;
        
        await update(ref(db, `rooms/${currentRoomId}`), {
            calledNumbers: [...calledNumbers, num],
            turnIndex: nextIndex
        });
    }

    function checkWin(calledNumbers, goal, players) {
        if (isGameOver) return;
        let lines = 0;
        const size = 5;
        
        // 建立布林矩陣
        const matrix = [];
        for (let i = 0; i < size; i++) {
            matrix[i] = myBoard.slice(i * size, i * size + size).map(n => calledNumbers.includes(n));
        }

        // 檢查橫線、豎線
        for (let i = 0; i < size; i++) {
            if (matrix[i].every(v => v)) lines++; // 橫
            if (matrix.map(row => row[i]).every(v => v)) lines++; // 豎
        }
        // 檢查斜線
        if ([0,1,2,3,4].every(i => matrix[i][i])) lines++;
        if ([0,1,2,3,4].every(i => matrix[i][4-i])) lines++;

        if (lines >= goal) {
            isGameOver = true;
            update(ref(db, `rooms/${currentRoomId}`), {
                status: 'ended',
                winnerName: currentUser.displayName
            });
        }
    }

    // --- 輔助功能 ---
    window.kick = (uid) => {
        remove(ref(db, `rooms/${currentRoomId}/players/${uid}`));
    };

    document.getElementById('btn-create').onclick = createRoom;
    document.getElementById('btn-join').onclick = () => joinRoom(document.getElementById('input-room-id').value);
    document.getElementById('btn-leave').onclick = () => location.reload();
    document.getElementById('btn-start').onclick = () => {
        update(ref(db, `rooms/${currentRoomId}`), {
            status: 'playing',
            settings: { goal: parseInt(document.getElementById('select-goal').value) }
        });
    };

    function showSection(id) {
        ['login-section', 'lobby-section', 'room-section'].forEach(s => {
            document.getElementById(s).classList.toggle('hidden', s !== id);
        });
    }
</script>
</body>
</html>
